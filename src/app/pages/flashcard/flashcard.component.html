<div class="page flash-page" *ngIf="currentWord">
  <div class="top-bar">
    <div routerLink="/hsk/2/lessons">←</div>

    <div class="title">
      Lesson {{ lesson }}
      <small>{{ currentIndex + 1 }} / {{ words.length }}</small>
    </div>

    <div>⚙️</div>
  </div>

  <div class="flash-card" (click)="flipped = !flipped">
    <ng-container *ngIf="!flipped">
      <div class="hanzi">{{ currentWord.HanZi }}</div>
      <p>Tap to flip</p>
    </ng-container>

    <ng-container *ngIf="flipped">
      <button class="sound">🔊</button>

      <div class="hanzi small">{{ currentWord.HanZi }}</div>
      <h3>{{ currentWord.Pinyin }}</h3>
      <h4>{{ currentWord.MeaningVi }}</h4>

      <hr>

      <p class="cn">{{ currentWord.ExampleCn }}</p>
      <p class="py">{{ currentWord.ExamplePy }}</p>
      <p class="vi">{{ currentWord.ExampleVi }}</p>
    </ng-container>
  </div>

  <div class="bottom-actions">
    <button class="danger" (click)="next()">✕ Don't know</button>
    <button class="success" (click)="next()">✓ Know</button>
  </div>
</div>
