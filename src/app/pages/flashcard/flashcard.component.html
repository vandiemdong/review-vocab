<div class="page flash-page">
  <div class="top-bar">
    <div routerLink="/hsk/2/lessons">←</div>
    <div class="title">
      Lesson 1
      <small>3 / 12</small>
    </div>
    <div>⚙️</div>
  </div>

  <div class="progress-bg">
    <div class="progress-fill" style="width: 30%"></div>
  </div>

  <div class="flash-card" (click)="flipped = !flipped">
    <ng-container *ngIf="!flipped">
      <div class="hanzi">旅游</div>
      <p>Tap to flip</p>
    </ng-container>

    <ng-container *ngIf="flipped">
      <button class="sound">🔊</button>

      <div class="hanzi small">旅游</div>
      <h3>lǚyóu</h3>
      <h4>du lịch</h4>

      <hr>

      <p class="cn">我想去中国旅游。</p>
      <p class="py">Wǒ xiǎng qù Zhōngguó lǚyóu.</p>
      <p class="vi">Tôi muốn đi Trung Quốc du lịch.</p>
    </ng-container>
  </div>

  <div class="bottom-actions">
    <button class="danger">✕ Don't know</button>
    <button class="success">✓ Know</button>
  </div>
</div>
